<div class="table-container">
  <div class="table-header" *ngIf="title">
    <div class="table-header-left">
      <button mat-icon-button routerLink="/admin/dashboard" class="back-button" [matTooltip]="'admin.backToDashboard' | transloco">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <h2>{{ title | transloco }}</h2>
    </div>
    <button mat-raised-button class="create-button" (click)="onCreateClick()" *ngIf="showCreateButton">
      {{ 'admin.table.createNew' | transloco }}
    </button>
  </div>
  
  <div *ngIf="loading" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <table mat-table [dataSource]="data" matSort (matSortChange)="onSortChange($event)" class="admin-table">
    <!-- Dynamic columns -->
    <ng-container *ngFor="let column of columns" [matColumnDef]="column.key">
      <th mat-header-cell *matHeaderCellDef 
          [mat-sort-header]="column.key"
          [disabled]="column.sortable === false || column.isActions"
          [ngClass]="getColumnClass(column)">
        {{ column.label | transloco }}
      </th>
      <td mat-cell *matCellDef="let row" [ngClass]="getColumnClass(column)">
        <ng-container *ngIf="!column.isActions">
          <span *ngIf="column.cellClass" [ngClass]="getCellClass(row, column)" class="cell-badge">
            {{ getCellValue(row, column) }}
          </span>
          <ng-container *ngIf="!column.cellClass">
            {{ getCellValue(row, column) }}
          </ng-container>
        </ng-container>
        <ng-container *ngIf="column.isActions">
          <div class="action-buttons">
            <button mat-icon-button *ngIf="actions.includes('view')" (click)="onViewClick(row)" matTooltip="View" class="action-btn view-btn">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button *ngIf="actions.includes('edit')" (click)="onEditClick(row)" matTooltip="Edit" class="action-btn edit-btn">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button *ngIf="actions.includes('delete')" (click)="onDeleteClick(row)" matTooltip="Delete" class="action-btn delete-btn">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </ng-container>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- No data row -->
    <tr class="mat-row no-data-row" *matNoDataRow>
      <td class="mat-cell" [attr.colspan]="displayedColumns.length">
        {{ 'admin.table.noData' | transloco }}
      </td>
    </tr>
  </table>

  <mat-paginator
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="pageSizeOptions"
    (page)="onPageChange($event)"
    showFirstLastButtons
    aria-label="Select page">
  </mat-paginator>
</div>

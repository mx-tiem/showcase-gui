<div class="container-fluid p-0 m-0 h-100 d-flex flex-column">
  <div class="logo-top" (click)="rollToFace('home')">
    <img src="assets/images/logo/logo.png" alt="Dojo Logo" class="logo-image" />
  </div>
  <div class="row flex-grow-1 m-0 h-100">
    <div class="col-12 p-0 m-0 flex-grow-1 d-flex flex-column align-items-center justify-content-center h-100">
      <div #container class="cube-container w-100 h-100"></div>
    </div>
  </div>

  <nav class="navigation-controls mb-3">
    <button mat-icon-button [class.active]="activeRoute === 'home'" (click)="rollToFace('home')" [title]="'nav.home' | transloco"><mat-icon>home</mat-icon></button>
    <button mat-icon-button [class.active]="activeRoute === 'reservations'" (click)="rollToFace('reservations')" [title]="'nav.reservations' | transloco"><mat-icon>event_available</mat-icon></button>
    <button mat-icon-button [class.active]="activeRoute === 'events'" (click)="rollToFace('events')" [title]="'nav.events' | transloco"><mat-icon>event</mat-icon></button>
    <button mat-icon-button [class.active]="activeRoute === 'friends'" (click)="rollToFace('friends')" [title]="'nav.friends' | transloco"><mat-icon>people</mat-icon></button>
    <button mat-icon-button [class.active]="activeRoute === 'hours'" (click)="rollToFace('hours')" [title]="'nav.hours' | transloco"><mat-icon>schedule</mat-icon></button>

    <!-- Account circle with dropup -->
    <button mat-icon-button
      [class.active]="activeRoute === 'settings'"
      [matMenuTriggerFor]="accountDropup"
      [title]="'nav.account' | transloco">
      <mat-icon>account_circle</mat-icon>
    </button>

    <mat-menu #accountDropup="matMenu" class="account-dropup" yPosition="above" xPosition="before">
      <div class="dropdown-header" (click)="$event.stopPropagation()">
        <mat-icon class="user-avatar-icon">account_circle</mat-icon>
        <span class="dropdown-title">{{ userName() }}</span>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="rollToFace('settings')">
        <mat-icon>settings</mat-icon>
        <span>{{ 'toolbar.settings' | transloco }}</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()" class="logout-item">
        <mat-icon>logout</mat-icon>
        <span>{{ 'toolbar.logout' | transloco }}</span>
      </button>
    </mat-menu>

    <!-- Notifications circle with dropup -->
    <button mat-icon-button
      [matMenuTriggerFor]="notificationDropup"
      (menuOpened)="onNotificationMenuOpened()"
      [title]="'nav.notifications' | transloco"
      class="notification-circle-btn">
      <mat-icon [matBadge]="unreadCount()" [matBadgeHidden]="unreadCount() === 0" matBadgeColor="warn" matBadgeSize="small">notifications</mat-icon>
    </button>

    <mat-menu #notificationDropup="matMenu" class="notification-dropup" yPosition="above" xPosition="before">
      <div class="dropdown-header" (click)="$event.stopPropagation()">
        <span class="dropdown-title">{{ 'toolbar.notifications' | transloco }}</span>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item *ngFor="let notification of notifications()" class="notification-item">
        <mat-icon [class.unread]="!notification.read">{{ notification.icon }}</mat-icon>
        <div class="notification-content">
          <span class="notification-message" [class.unread]="!notification.read">{{ notification.short_description }}</span>
          <span class="notification-time">{{ notification.title }}</span>
        </div>
      </button>
      <mat-divider *ngIf="notifications().length > 0"></mat-divider>
      <button mat-menu-item *ngIf="notifications().length > 0" class="view-all-btn" (click)="onViewAllNotifications()">
        <span class="view-all-text">{{ 'toolbar.viewAll' | transloco }}</span>
      </button>
      <button mat-menu-item *ngIf="notifications().length === 0" disabled>
        <span>{{ 'toolbar.noNotifications' | transloco }}</span>
      </button>
    </mat-menu>
  </nav>
</div>
